name: Android release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name (for example 1.1.0)
        required: true
      version_code:
        description: Monotonically increasing Android version code
        required: true
  push:
    tags:
      - 'android-v*'

jobs:
  signed-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Validate release secrets
        env:
          API_URL: ${{ secrets.FAMILY_TREE_RELEASE_API_BASE_URL }}
          STORE_B64: ${{ secrets.FAMILY_TREE_RELEASE_STORE_B64 }}
          STORE_PASSWORD: ${{ secrets.FAMILY_TREE_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.FAMILY_TREE_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.FAMILY_TREE_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$API_URL"
          test -n "$STORE_B64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          case "$API_URL" in https://*) ;; *) exit 1 ;; esac
      - name: Prepare signing keystore
        working-directory: android-client
        env:
          STORE_B64: ${{ secrets.FAMILY_TREE_RELEASE_STORE_B64 }}
        run: echo "$STORE_B64" | base64 --decode > release.keystore
      - name: Build and test signed release
        working-directory: android-client
        env:
          FAMILY_TREE_RELEASE_API_BASE_URL: ${{ secrets.FAMILY_TREE_RELEASE_API_BASE_URL }}
          FAMILY_TREE_RELEASE_STORE_FILE: release.keystore
          FAMILY_TREE_RELEASE_STORE_PASSWORD: ${{ secrets.FAMILY_TREE_RELEASE_STORE_PASSWORD }}
          FAMILY_TREE_RELEASE_KEY_ALIAS: ${{ secrets.FAMILY_TREE_RELEASE_KEY_ALIAS }}
          FAMILY_TREE_RELEASE_KEY_PASSWORD: ${{ secrets.FAMILY_TREE_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          VERSION_NAME="${{ inputs.version_name }}"
          VERSION_CODE="${{ inputs.version_code }}"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="${GITHUB_REF_NAME#android-v}"; fi
          if [ -z "$VERSION_CODE" ]; then VERSION_CODE="$GITHUB_RUN_NUMBER"; fi
          ./gradlew lintRelease testDebugUnitTest bundleRelease \
            -PfamilyTreeVersionName="$VERSION_NAME" \
            -PfamilyTreeVersionCode="$VERSION_CODE"
      - name: Verify signing and checksum
        working-directory: android-client
        run: |
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab
          sha256sum app/build/outputs/bundle/release/app-release.aab > app-release.aab.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: familyroot-signed-release
          path: |
            android-client/app/build/outputs/bundle/release/app-release.aab
            android-client/app-release.aab.sha256
          if-no-files-found: error
