name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint:check
      - run: npm run build
      - run: npm test -- --runInBand
      - run: npm run test:e2e
        env:
          DB_DATABASE: phase1-ci.sqlite
          JWT_SECRET: phase1-ci-secret-at-least-32-characters
      - name: Build production container
        working-directory: .
        run: docker build --tag familyroot-backend:ci .

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: ./gradlew lintDebug testDebugUnitTest assembleDebug bundleRelease -PfamilyTreeReleaseApiBaseUrl=https://ci.familyroot.invalid/
      - name: Enforce release bundle size budget
        run: test $(stat -c%s app/build/outputs/bundle/release/app-release.aab) -le 26214400
      - uses: actions/upload-artifact@v4
        with:
          name: familyroot-unsigned-release
          path: android-client/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
